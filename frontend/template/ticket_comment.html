<!DOCTYPE html>
<html>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: auto; color: #222;">
  <div style="background: #5b9cf6; padding: 16px 24px; border-radius: 8px 8px 0 0;">
    <h2 style="color: white; margin: 0;">Nova resposta no teu ticket</h2>
  </div>
  <div style="border: 1px solid #ddd; border-top: none; padding: 24px; border-radius: 0 0 8px 8px;">
    <h3 style="margin-bottom: 4px;">#{ticket_id} — {title}</h3>
    <p style="color: #888; font-size: 13px;">De: <strong>{author}</strong></p>
    <p style="background: #f6f6f6; padding: 12px; border-radius: 4px; white-space: pre-wrap;">{body}</p>
    <p>
      <a href="{frontend_url}/#/tickets/{ticket_id}"
         style="display: inline-block; background: #5b9cf6; color: white; padding: 10px 20px; border-radius: 6px; text-decoration: none; font-weight: 500;">
        Ver ticket e responder
      </a>
    </p>
    <p style="color: #aaa; font-size: 11px; margin-top: 24px;">Sistema Helpdesk — email automático.</p>
  </div>
</body>
</html>
